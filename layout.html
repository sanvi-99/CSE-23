<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layout 1</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .row{
            border:1px solid black;
            height:120px;
            text-align: center;
            margin-bottom: 10px;
            color:blue;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <h2>heading</h2>
            </div>
        </div>
    
    <!--navigation-->
    <div class="row">
        <div class="col-lg-12">
            <h2>navbar</h2>

        </div>
    </div>
    <!--main content-->
    <div class="row box gy-2">
        <div class="col-lg-6 bg-info d-flex">
            <div class="col-lg-6 bg-success">
                <h2>left1</h2>
            </div>
        
            <div class="col-lg-6 bg-warning">
                <h2>left2</h2>
            </div>
            </div>
            <div class="col-lg-6">

                <div class="col-lg-12 bg-info h-50">
                    <h2>right top</h2>
                </div>
                <div class="col-lg-12 bg-danger h-50">
                    <h2>right bottom</h2>
                </div>
            </div>
        
    </div>

    <!--footer-->
    <div class="row">
        <div class="col-lg-12">
            <h2>footer</h2>
        </div>
    </div>
    
</body>
</html>
